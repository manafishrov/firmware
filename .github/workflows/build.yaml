name: Release Build

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*

permissions:
  contents: write

jobs:
  build-sd-image:
    runs-on: ubuntu-24.04-arm
    env:
      ARTIFACT_PREFIX: pi3-imx477
      RELEASES_PREFIX: releases
      RETAIN_RELEASES: "3"
      VERSION: ${{ github.ref_name }}
      FIRMWARE_RELEASE_BASE_URL: https://s3.manafishrov.com/manafishrov-firmware
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@4a754ab0c192f4d12cf88b5954b9dd13fd2d612e # main
        with:
          diagnostic-endpoint: ""

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@3c034b51a9deec0a09ef1df8b436ac5db50fae94 # main
        with:
          diagnostic-endpoint: ""

      - name: Stage RAUC bundle signing material
        env:
          RAUC_SIGNING_KEY: ${{ secrets.RAUC_SIGNING_KEY }}
          RAUC_SIGNING_CERT: ${{ secrets.RAUC_SIGNING_CERT }}
        run: |
          set -euo pipefail

          if [ -z "$RAUC_SIGNING_KEY" ] || [ -z "$RAUC_SIGNING_CERT" ]; then
            echo "::error::RAUC_SIGNING_KEY and RAUC_SIGNING_CERT secrets are required." >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/rauc"
          chmod 700 "$RUNNER_TEMP/rauc"
          printf '%s' "$RAUC_SIGNING_KEY" > "$RUNNER_TEMP/rauc/bundle.key"
          printf '%s' "$RAUC_SIGNING_CERT" > "$RUNNER_TEMP/rauc/bundle-chain.pem"
          chmod 600 "$RUNNER_TEMP/rauc/bundle.key"
          chmod 644 "$RUNNER_TEMP/rauc/bundle-chain.pem"

          echo "RAUC_SIGNING_KEY_PATH=$RUNNER_TEMP/rauc/bundle.key" >> "$GITHUB_ENV"
          echo "RAUC_SIGNING_CERT_PATH=$RUNNER_TEMP/rauc/bundle-chain.pem" >> "$GITHUB_ENV"

      - name: Build Nix outputs
        run: |
          nix build --accept-flake-config \
            --impure .#sdImage --out-link result-sd-image
          nix build --accept-flake-config \
            --option extra-sandbox-paths "$RUNNER_TEMP/rauc" \
            --impure .#raucBundle --out-link result-rauc-bundle

      - name: Assemble release artifacts
        env:
          FIRMWARE_SIGNING_PRIVATE_KEY: ${{ secrets.FIRMWARE_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$FIRMWARE_RELEASE_BASE_URL" ]; then
            echo "::error::Repository variable FIRMWARE_RELEASE_BASE_URL is missing."
            exit 1
          fi

          nix profile install nixpkgs#python3 nixpkgs#minisign

          mkdir -p dist

          SD_IMAGE_NAME="${ARTIFACT_PREFIX}-${VERSION}.img.zst"
          BUNDLE_NAME="${ARTIFACT_PREFIX}-${VERSION}.raucb"
          CHECKSUM_NAME="${ARTIFACT_PREFIX}-${VERSION}.sha256"
          MANIFEST_NAME="${ARTIFACT_PREFIX}-${VERSION}.json"

          cp result-sd-image/manafishrov-${VERSION}.img.zst "dist/${SD_IMAGE_NAME}"
          cp result-rauc-bundle/manafishrov-${VERSION}.raucb "dist/${BUNDLE_NAME}"

          (
            cd dist
            sha256sum "${SD_IMAGE_NAME}" "${BUNDLE_NAME}" > "${CHECKSUM_NAME}"
          )

          printf '%s' "$FIRMWARE_SIGNING_PRIVATE_KEY" > firmware-signing.key
          chmod 600 firmware-signing.key
          minisign -S -s firmware-signing.key -m "dist/${SD_IMAGE_NAME}" -x "dist/${SD_IMAGE_NAME}.minisig"
          minisign -S -s firmware-signing.key -m "dist/${BUNDLE_NAME}" -x "dist/${BUNDLE_NAME}.minisig"
          minisign -S -s firmware-signing.key -m "dist/${CHECKSUM_NAME}" -x "dist/${CHECKSUM_NAME}.minisig"

          export SD_IMAGE_NAME
          export BUNDLE_NAME
          export CHECKSUM_NAME
          export MANIFEST_NAME

          python3 <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          dist = Path("dist")
          version = os.environ["VERSION"]
          prefix = os.environ["ARTIFACT_PREFIX"]
          base_url = os.environ["FIRMWARE_RELEASE_BASE_URL"].rstrip("/")
          release_dir = os.environ["RELEASES_PREFIX"].strip("/")
          def file_sha256(path: Path) -> str:
            digest = hashlib.sha256()
            with path.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                digest.update(chunk)
            return digest.hexdigest()

          artifacts = []
          for file_name, kind, format_name in [
            (os.environ["SD_IMAGE_NAME"], "sd-image", "manafish-ab-image+zstd"),
            (os.environ["BUNDLE_NAME"], "rauc-bundle", "rauc-verity"),
            (os.environ["CHECKSUM_NAME"], "checksums", "sha256sum"),
          ]:
            path = dist / file_name
            artifact = {
              "name": file_name,
              "kind": kind,
              "format": format_name,
              "url": f"{base_url}/{release_dir}/{version}/{file_name}",
              "size": path.stat().st_size,
              "sha256": file_sha256(path),
            }
            signature_path = Path(f"{path}.minisig")
            artifact["signature"] = {
              "url": f"{base_url}/{release_dir}/{version}/{signature_path.name}",
              "format": "minisign",
            }
            artifacts.append(artifact)

          manifest = {
            "version": version,
            "product": prefix,
            "publishedAt": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
            "releaseUrl": f"{base_url}/{release_dir}/{version}/",
            "offlineInstall": {
              "bundleFormat": "rauc-verity",
              "installCommand": f"rauc install /var/lib/manafish-firmware-update/{os.environ['BUNDLE_NAME']}",
            },
            "signing": {
              "enabled": True,
              "scheme": "minisign",
            },
            "artifacts": artifacts,
          }

          manifest_path = dist / os.environ["MANIFEST_NAME"]
          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY

          minisign -S -s firmware-signing.key -m "dist/${MANIFEST_NAME}" -x "dist/${MANIFEST_NAME}.minisig"
          rm -f firmware-signing.key

      - name: Upload to cloud storage
        env:
          RCLONE_CONF_CONTENT: ${{ secrets.RCLONE_CONF }}
        run: |
          set -euo pipefail

          if [ -z "$RCLONE_CONF_CONTENT" ]; then
            echo "::error::Secret RCLONE_CONF is missing. Skipping upload."
            exit 1
          fi

          if [ -z "$FIRMWARE_RELEASE_BASE_URL" ]; then
            echo "::error::Repository variable FIRMWARE_RELEASE_BASE_URL is missing."
            exit 1
          fi

          nix profile install nixpkgs#rclone

          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF_CONTENT" > ~/.config/rclone/rclone.conf

          TARGET_DIR="${RELEASES_PREFIX}/${VERSION}"

          echo "Uploading to $TARGET_DIR..."
          rclone copy dist "remote:${TARGET_DIR}" --progress
          rclone copyto "dist/${ARTIFACT_PREFIX}-${VERSION}.json" "remote:${RELEASES_PREFIX}/latest.json"
          rclone copyto "dist/${ARTIFACT_PREFIX}-${VERSION}.json.minisig" "remote:${RELEASES_PREFIX}/latest.json.minisig"

      - name: Prune old cloud releases
        env:
          RCLONE_CONF_CONTENT: ${{ secrets.RCLONE_CONF }}
        run: |
          set -euo pipefail

          nix profile install nixpkgs#rclone

          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF_CONTENT" > ~/.config/rclone/rclone.conf

          mapfile -t RELEASE_DIRS < <(rclone lsf "remote:${RELEASES_PREFIX}" --dirs-only | tr -d '/' | awk '/^v/' | sort -V)

          if [ "${#RELEASE_DIRS[@]}" -le "$RETAIN_RELEASES" ]; then
            exit 0
          fi

          DELETE_COUNT=$((${#RELEASE_DIRS[@]} - RETAIN_RELEASES))
          for OLD_RELEASE in "${RELEASE_DIRS[@]:0:${DELETE_COUNT}}"; do
            rclone purge "remote:${RELEASES_PREFIX}/${OLD_RELEASE}"
          done

      - name: Generate release notes
        run: |
          set -euo pipefail

          BASE_URL="${FIRMWARE_RELEASE_BASE_URL%/}/${RELEASES_PREFIX}/${VERSION}"
          MANIFEST_NAME="${ARTIFACT_PREFIX}-${VERSION}.json"
          CHECKSUM_NAME="${ARTIFACT_PREFIX}-${VERSION}.sha256"

          cat > release-notes.md <<EOF
          Release assets for ${VERSION}.

          ## Firmware artifacts

          - [${ARTIFACT_PREFIX}-${VERSION}.img.zst](${BASE_URL}/${ARTIFACT_PREFIX}-${VERSION}.img.zst) — factory SD card image (one-shot \`dd\`)
          - [${ARTIFACT_PREFIX}-${VERSION}.raucb](${BASE_URL}/${ARTIFACT_PREFIX}-${VERSION}.raucb) — RAUC OTA bundle for in-place A/B updates
          - [${CHECKSUM_NAME}](${BASE_URL}/${CHECKSUM_NAME})
          - [${MANIFEST_NAME}](${BASE_URL}/${MANIFEST_NAME})
          - [latest.json](${FIRMWARE_RELEASE_BASE_URL%/}/${RELEASES_PREFIX}/latest.json)
          EOF

          cat >> release-notes.md <<EOF
          - [${ARTIFACT_PREFIX}-${VERSION}.img.zst.minisig](${BASE_URL}/${ARTIFACT_PREFIX}-${VERSION}.img.zst.minisig)
          - [${ARTIFACT_PREFIX}-${VERSION}.raucb.minisig](${BASE_URL}/${ARTIFACT_PREFIX}-${VERSION}.raucb.minisig)
          - [${CHECKSUM_NAME}.minisig](${BASE_URL}/${CHECKSUM_NAME}.minisig)
          - [${MANIFEST_NAME}.minisig](${BASE_URL}/${MANIFEST_NAME}.minisig)
          - [latest.json.minisig](${FIRMWARE_RELEASE_BASE_URL%/}/${RELEASES_PREFIX}/latest.json.minisig)
          EOF

      - name: Create or update draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
