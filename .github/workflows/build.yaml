name: Release Build

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*

permissions:
  contents: write

jobs:
  build-sd-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210 # main
        with:
          diagnostic-endpoint: ""

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@b4a9864e3a8ab8179be30f2e70fd71fe9996bb9d # main
        with:
          diagnostic-endpoint: ""

      - name: Build SD image
        run: nix build --accept-flake-config

      - name: Check if release exists
        if: startsWith(github.ref, 'refs/tags/')
        id: check_release
        run: |
          if gh release view ${{ github.ref_name }} --json id > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/') && steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Release assets for ${{ github.ref_name }}."
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload to Cloud Storage (Rclone)
        env:
          RCLONE_CONF_CONTENT: ${{ secrets.RCLONE_CONF }}
        run: |
          if [ -z "$RCLONE_CONF_CONTENT" ]; then
            echo "::error::Secret RCLONE_CONF is missing. Skipping upload."
            exit 1
          fi

          nix profile install nixpkgs#rclone

          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF_CONTENT" > ~/.config/rclone/rclone.conf

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_DIR="manual/${{ github.ref_name }}"
          else
            TARGET_DIR="releases/${{ github.ref_name }}"
          fi

          echo "Uploading to $TARGET_DIR..."
          rclone copy result/sd-image/*.img.zst "remote:$TARGET_DIR" --progress
