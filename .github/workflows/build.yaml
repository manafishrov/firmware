name: Release Build

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*

permissions:
  contents: write

jobs:
  build-sd-image:
    runs-on: ubuntu-24.04-arm
    env:
      ARTIFACT_PREFIX: pi3-imx477
      RELEASES_PREFIX: releases
      RETAIN_RELEASES: "5"
      VERSION: ${{ github.ref_name }}
      FIRMWARE_RELEASE_BASE_URL: https://s3.manafishrov.com/manafishrov-firmware
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build, sign and upload firmware artifacts
        uses: ./.github/actions/build-and-upload
        with:
          version: ${{ env.VERSION }}
          artifact-prefix: ${{ env.ARTIFACT_PREFIX }}
          releases-prefix: ${{ env.RELEASES_PREFIX }}
          release-base-url: ${{ env.FIRMWARE_RELEASE_BASE_URL }}
          signing-key: ${{ secrets.FIRMWARE_SIGNING_PRIVATE_KEY }}
          rclone-conf: ${{ secrets.RCLONE_CONF }}

      - name: Prune old cloud releases
        env:
          RCLONE_CONF_CONTENT: ${{ secrets.RCLONE_CONF }}
        run: |
          set -euo pipefail

          nix profile install nixpkgs#rclone

          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF_CONTENT" > ~/.config/rclone/rclone.conf

          mapfile -t RELEASE_DIRS < <(rclone lsf "remote:${RELEASES_PREFIX}" --dirs-only | tr -d '/' | awk '/^v/' | sort -V)

          if [ "${#RELEASE_DIRS[@]}" -le "$RETAIN_RELEASES" ]; then
            exit 0
          fi

          DELETE_COUNT=$((${#RELEASE_DIRS[@]} - RETAIN_RELEASES))
          for OLD_RELEASE in "${RELEASE_DIRS[@]:0:${DELETE_COUNT}}"; do
            rclone purge "remote:${RELEASES_PREFIX}/${OLD_RELEASE}"
          done

      - name: Generate release notes
        run: |
          set -euo pipefail

          BASE_URL="${FIRMWARE_RELEASE_BASE_URL%/}/${RELEASES_PREFIX}/${VERSION}"
          MANIFEST_NAME="${ARTIFACT_PREFIX}-${VERSION}.json"
          CHECKSUM_NAME="${ARTIFACT_PREFIX}-${VERSION}.sha256"

          cat > release-notes.md <<EOF
          Release assets for ${VERSION}.

          ## Firmware artifacts

          - [${ARTIFACT_PREFIX}-${VERSION}.img.zst](${BASE_URL}/${ARTIFACT_PREFIX}-${VERSION}.img.zst)
          - [${CHECKSUM_NAME}](${BASE_URL}/${CHECKSUM_NAME})
          - [${MANIFEST_NAME}](${BASE_URL}/${MANIFEST_NAME})
          - [${ARTIFACT_PREFIX}-${VERSION}.img.zst.minisig](${BASE_URL}/${ARTIFACT_PREFIX}-${VERSION}.img.zst.minisig)
          - [${CHECKSUM_NAME}.minisig](${BASE_URL}/${CHECKSUM_NAME}.minisig)
          - [${MANIFEST_NAME}.minisig](${BASE_URL}/${MANIFEST_NAME}.minisig)
          EOF

      - name: Create or update draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
