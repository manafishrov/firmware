name: Re-upload Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: Firmware tag to rebuild and force-upload (e.g. v1.0.26).
        required: true
        type: string

permissions:
  contents: read

jobs:
  re-upload:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::version '$VERSION' does not match v<major>.<minor>.<patch>[-suffix]"
            exit 1
          fi

      - name: Checkout firmware source at tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.version }}

      - name: Build, sign and force-upload firmware artifacts
        uses: manafishrov/firmware/.github/actions/build-and-upload@c9e3be42395a6fbeacabd8ab9006f2663255df54 # main
        with:
          version: ${{ inputs.version }}
          signing-key: ${{ secrets.FIRMWARE_SIGNING_PRIVATE_KEY }}
          rclone-conf: ${{ secrets.RCLONE_CONF }}
          force-upload: "true"
