name: Sync Python deps

on:
  pull_request:
    paths:
      - flake.lock
      - flake.nix
      - nix/firmware.nix
      - sync-python-deps.sh

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    # Only run on PRs from the same repo (so we can push back). Forks fall
    # back to the assertion job below.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main
        with:
          diagnostic-endpoint: ""

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839 # main
        with:
          diagnostic-endpoint: ""

      - name: Run sync script
        run: ./sync-python-deps.sh

      - name: Regenerate uv.lock to match
        run: nix develop --command uv lock

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain pyproject.toml uv.lock)" ]; then
            echo "pyproject.toml and uv.lock already in sync with nixpkgs."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pyproject.toml uv.lock
          git commit -m 'chore(deps): sync pyproject.toml and uv.lock with nixpkgs'
          git push

  verify:
    # Runs for forks (where the sync job can't push). Fails the PR if
    # pyproject.toml is out of sync — the PR author has to run the script
    # locally and push the result.
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main
        with:
          diagnostic-endpoint: ""

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839 # main
        with:
          diagnostic-endpoint: ""

      - name: Run sync script
        run: ./sync-python-deps.sh

      - name: Regenerate uv.lock to match
        run: nix develop --command uv lock

      - name: Fail if pyproject.toml or uv.lock is out of sync
        run: |
          if [ -n "$(git status --porcelain pyproject.toml uv.lock)" ]; then
            echo "::error::pyproject.toml or uv.lock is out of sync with nixpkgs. Run ./sync-python-deps.sh && uv lock locally and commit the result."
            git --no-pager diff pyproject.toml uv.lock
            exit 1
          fi
