name: CI

on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            nix:
              - '**/*.nix'
              - 'flake.nix'
              - 'flake.lock'
            python:
              - 'pyproject.toml'
              - 'src/**'
              - 'tests/**'

  code-quality-nix:
    needs: filter
    if: needs.filter.outputs.nix == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: Check formatting (alejandra, statix, deadnix)
        run: nix fmt -- --ci .
      - name: Validate flake
        run: nix flake check --show-trace

  code-quality-python:
    needs: filter
    if: needs.filter.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run ruff linter
        run: uv run ruff check --no-fix
      - name: Run ruff formatter check
        run: uv run ruff format --check
      - name: Run ty type check
        run: uv run ty check
      - name: Run tests
        run: uv run pytest

  validate-nix-eval:
    needs: filter
    if: needs.filter.outputs.nix == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: Evaluate configuration (dry-run)
        run: nix build --accept-flake-config --dry-run
