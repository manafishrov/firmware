name: Build and upload firmware
description: Build, sign and rclone-upload the NixOS SD image.

inputs:
  version:
    description: Firmware version tag.
    required: true
  artifact-prefix:
    description: Artifact name prefix.
    required: false
    default: pi3-imx477
  releases-prefix:
    description: Remote releases prefix.
    required: false
    default: releases
  release-base-url:
    description: Public base URL of the bucket.
    required: false
    default: https://s3.manafishrov.com/manafishrov-firmware
  signing-key:
    description: Minisign private signing key.
    required: true
  rclone-conf:
    description: rclone config file contents.
    required: true
  force-upload:
    description: When 'true', use rclone --ignore-times to overwrite existing objects.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main
      with:
        diagnostic-endpoint: ""

    - name: Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839 # main
      with:
        diagnostic-endpoint: ""

    - name: Build Nix outputs
      shell: bash
      run: |
        nix build --accept-flake-config .#sdImage --out-link result-sd-image

    - name: Assemble release artifacts
      shell: bash
      env:
        ARTIFACT_PREFIX: ${{ inputs.artifact-prefix }}
        RELEASES_PREFIX: ${{ inputs.releases-prefix }}
        FIRMWARE_RELEASE_BASE_URL: ${{ inputs.release-base-url }}
        VERSION: ${{ inputs.version }}
        FIRMWARE_SIGNING_PRIVATE_KEY: ${{ inputs.signing-key }}
      run: |
        set -euo pipefail

        if [ -z "$FIRMWARE_RELEASE_BASE_URL" ]; then
          echo "::error::release-base-url input is empty."
          exit 1
        fi

        nix profile install nixpkgs#python3 nixpkgs#minisign

        mkdir -p dist

        SD_IMAGE_NAME="${ARTIFACT_PREFIX}-${VERSION}.img.zst"
        CHECKSUM_NAME="${ARTIFACT_PREFIX}-${VERSION}.sha256"
        MANIFEST_NAME="${ARTIFACT_PREFIX}-${VERSION}.json"

        cp result-sd-image/sd-image/*.img.zst "dist/${SD_IMAGE_NAME}"

        (
          cd dist
          sha256sum "${SD_IMAGE_NAME}" > "${CHECKSUM_NAME}"
        )

        printf '%s' "$FIRMWARE_SIGNING_PRIVATE_KEY" > firmware-signing.key
        chmod 600 firmware-signing.key
        minisign -S -s firmware-signing.key -m "dist/${SD_IMAGE_NAME}" -x "dist/${SD_IMAGE_NAME}.minisig"
        minisign -S -s firmware-signing.key -m "dist/${CHECKSUM_NAME}" -x "dist/${CHECKSUM_NAME}.minisig"

        export SD_IMAGE_NAME
        export CHECKSUM_NAME
        export MANIFEST_NAME

        python3 <<'PY'
        import hashlib
        import json
        import os
        from datetime import datetime, timezone
        from pathlib import Path

        dist = Path("dist")
        version = os.environ["VERSION"]
        prefix = os.environ["ARTIFACT_PREFIX"]
        base_url = os.environ["FIRMWARE_RELEASE_BASE_URL"].rstrip("/")
        release_dir = os.environ["RELEASES_PREFIX"].strip("/")
        def file_sha256(path: Path) -> str:
          digest = hashlib.sha256()
          with path.open("rb") as handle:
            for chunk in iter(lambda: handle.read(1024 * 1024), b""):
              digest.update(chunk)
          return digest.hexdigest()

        artifacts = []
        for file_name, kind, format_name in [
          (os.environ["SD_IMAGE_NAME"], "sd-image", "nixos-sd-image"),
          (os.environ["CHECKSUM_NAME"], "checksums", "sha256sum"),
        ]:
          path = dist / file_name
          artifact = {
            "name": file_name,
            "kind": kind,
            "format": format_name,
            "url": f"{base_url}/{release_dir}/{version}/{file_name}",
            "size": path.stat().st_size,
            "sha256": file_sha256(path),
          }
          signature_path = Path(f"{path}.minisig")
          artifact["signature"] = {
            "url": f"{base_url}/{release_dir}/{version}/{signature_path.name}",
            "format": "minisign",
          }
          artifacts.append(artifact)

        manifest = {
          "version": version,
          "product": prefix,
          "publishedAt": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
          "releaseUrl": f"{base_url}/{release_dir}/{version}/",
          "signing": {
            "enabled": True,
            "scheme": "minisign",
          },
          "artifacts": artifacts,
        }

        manifest_path = dist / os.environ["MANIFEST_NAME"]
        manifest_path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
        PY

        minisign -S -s firmware-signing.key -m "dist/${MANIFEST_NAME}" -x "dist/${MANIFEST_NAME}.minisig"
        rm -f firmware-signing.key

    - name: Upload to cloud storage
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        RELEASES_PREFIX: ${{ inputs.releases-prefix }}
        RCLONE_CONF_CONTENT: ${{ inputs.rclone-conf }}
        FORCE_UPLOAD: ${{ inputs.force-upload }}
      run: |
        set -euo pipefail

        if [ -z "$RCLONE_CONF_CONTENT" ]; then
          echo "::error::rclone-conf input is empty."
          exit 1
        fi

        nix profile install nixpkgs#rclone

        mkdir -p ~/.config/rclone
        printf '%s' "$RCLONE_CONF_CONTENT" > ~/.config/rclone/rclone.conf

        TARGET_DIR="${RELEASES_PREFIX}/${VERSION}"

        # --ignore-times forces every file to be re-transferred regardless of
        # size/mtime matches. We only set it when force-upload is true so the
        # normal release path keeps rclone's resume semantics on retries.
        extra_flags=()
        if [ "$FORCE_UPLOAD" = "true" ]; then
          extra_flags+=(--ignore-times)
        fi

        echo "Uploading to ${TARGET_DIR} (force-upload=${FORCE_UPLOAD})..."
        rclone copy dist "remote:${TARGET_DIR}" --progress "${extra_flags[@]}"
