minimum_pre_commit_version: "4.3.0"
default_install_hook_types:
  - pre-commit
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or:
          - python
          - pyi
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or:
          - python
          - pyi
        require_serial: true
